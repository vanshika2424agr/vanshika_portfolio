<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Vanshika Agrawal | Backend Developer & AI Engineer</title>
    <meta
      name="description"
      content="Portfolio of Vanshika Agrawal — CS student at UCER Prayagraj, backend developer, AI engineer, MNNIT intern, and national hackathon competitor. Open to internships and full-time roles."
    />
    <meta
      name="keywords"
      content="Vanshika Agrawal, backend developer, Node.js, AI engineer, UCER Prayagraj, MNNIT intern, CS student portfolio, React developer, MongoDB"
    />
    <meta name="author" content="Vanshika Agrawal" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / LinkedIn preview -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Vanshika Agrawal | Backend Developer & AI Engineer"
    />
    <meta
      property="og:description"
      content="CS student building reliable systems and AI products. 8.5+ SGPA · 150+ LeetCode · MNNIT intern · 3 national hackathons."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Vanshika Agrawal portfolio preview"
    />
    <meta property="og:url" content="https://vanshikaagrawal.dev" />
    <meta property="og:site_name" content="Vanshika Agrawal Portfolio" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Vanshika Agrawal | Backend Developer & AI Engineer"
    />
    <meta
      name="twitter:description"
      content="CS student building reliable systems and AI products."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme colour for mobile browser chrome -->
    <meta name="theme-color" content="#070B14" />
    <meta name="color-scheme" content="dark" />

    <!-- Favicon — SVG preferred (scales perfectly), PNG fallback -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>"
    />

    <!-- Performance: preconnect to font origins early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: display=swap prevents invisible text during load -->
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- React root — App.jsx provides a <main> landmark inside -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
